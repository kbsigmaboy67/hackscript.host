<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HackTerminal v3.0 — HackScript Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/javascript-hint.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css"/>
<style>
  :root {
    --red:       #ff2244;
    --red-dim:   #991122;
    --red-glow:  rgba(255,34,68,0.35);
    --blue:      #00aaff;
    --blue-dim:  #005599;
    --blue-glow: rgba(0,170,255,0.35);
    --cyan:      #00ffee;
    --cyan-dim:  rgba(0,255,238,0.15);
    --bg0:       #000000;
    --bg1:       #050508;
    --bg2:       #0a0a12;
    --bg3:       #0f0f1a;
    --bg4:       #141422;
    --border:    #1a1a2e;
    --text:      #c8d0e0;
    --text-dim:  #556070;
    --green:     #00ff88;
    --yellow:    #ffcc00;
    --purple:    #aa44ff;
    --white:     #e8eaf0;
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud:  'Orbitron', sans-serif;
    --font-ui:   'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg0);
    color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
    cursor: default;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* ─── Layout ─── */
  #app {
    display: grid;
    grid-template-rows: 44px 1fr;
    grid-template-columns: 260px 1fr 300px;
    height: 100vh;
    gap: 0;
  }

  /* ─── Titlebar ─── */
  #titlebar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    background: linear-gradient(90deg, var(--bg0) 0%, var(--bg2) 40%, var(--bg0) 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  #titlebar::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), var(--blue), transparent);
    animation: titleline 3s linear infinite;
  }
  @keyframes titleline {
    0%   { opacity: 0.4; }
    50%  { opacity: 1; }
    100% { opacity: 0.4; }
  }

  .tb-logo {
    font-family: var(--font-hud);
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--red), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .tb-sep { color: var(--border); font-size: 18px; }
  .tb-version {
    font-family: var(--font-hud); font-size: 9px;
    color: var(--text-dim); letter-spacing: 2px;
  }
  .tb-status {
    margin-left: auto; display: flex; gap: 16px; align-items: center;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .tb-clock {
    font-family: var(--font-hud); font-size: 10px;
    color: var(--blue); letter-spacing: 2px;
  }

  /* ─── Sidebar ─── */
  #sidebar {
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
  }
  .sidebar-title {
    font-family: var(--font-hud); font-size: 9px;
    color: var(--text-dim); letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 12px 8px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    font-size: 11px; color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .sidebar-item:hover {
    color: var(--white);
    background: rgba(0,170,255,0.06);
  }
  .sidebar-item:hover::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--blue);
  }
  .sidebar-item .si-tag {
    margin-left: auto;
    font-size: 9px; color: var(--text-dim);
    background: var(--bg3); padding: 1px 5px;
    border-radius: 2px;
  }
  .si-proxy .si-tag { color: var(--red); border: 1px solid var(--red-dim); }
  .si-game  .si-tag { color: var(--blue); border: 1px solid var(--blue-dim); }
  #sidebar-list { overflow-y: auto; flex: 1; }
  #sidebar-list::-webkit-scrollbar { width: 3px; }
  #sidebar-list::-webkit-scrollbar-thumb { background: var(--border); }

  .filter-bar {
    display: flex; gap: 4px; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    font-family: var(--font-hud); font-size: 9px;
    padding: 3px 8px; border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-dim);
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(0,170,255,0.1); }
  .filter-btn:hover:not(.active) { border-color: var(--text-dim); color: var(--white); }

  /* ─── Main Terminal ─── */
  #main {
    display: flex; flex-direction: column;
    background: var(--bg0);
    overflow: hidden;
    position: relative;
  }

  /* Tab bar */
  #tabs {
    display: flex; align-items: center; gap: 0;
    background: var(--bg1); border-bottom: 1px solid var(--border);
    height: 34px; padding: 0 8px;
  }
  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px; height: 34px;
    font-family: var(--font-ui); font-size: 12px; font-weight: 500;
    color: var(--text-dim); cursor: pointer;
    border-right: 1px solid var(--border);
    transition: all 0.15s;
    letter-spacing: 1px;
    position: relative;
  }
  .tab.active {
    color: var(--white);
    background: var(--bg0);
  }
  .tab.active::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--red), var(--blue));
  }
  .tab:hover:not(.active) { color: var(--text); background: var(--bg2); }
  .tab-add {
    padding: 0 12px; color: var(--text-dim);
    cursor: pointer; font-size: 16px;
  }
  .tab-add:hover { color: var(--blue); }

  /* Panel containers */
  #panels {
    flex: 1; overflow: hidden;
    display: grid; grid-template-rows: 1fr 34px 280px;
  }

  /* Terminal output */
  #terminal {
    overflow-y: auto; overflow-x: hidden;
    padding: 12px 16px;
    background: var(--bg0);
    position: relative;
  }
  #terminal::-webkit-scrollbar { width: 4px; }
  #terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #terminal::-webkit-scrollbar-thumb:hover { background: var(--blue-dim); }

  .t-line {
    display: flex; align-items: flex-start; gap: 8px;
    line-height: 1.6; font-size: 13px;
    margin-bottom: 1px;
    animation: line-in 0.12s ease-out;
  }
  @keyframes line-in {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .t-prompt { color: var(--red); flex-shrink: 0; user-select: none; }
  .t-out    { color: var(--text); white-space: pre-wrap; word-break: break-all; }
  .t-err    { color: var(--red); }
  .t-ok     { color: var(--green); }
  .t-info   { color: var(--blue); }
  .t-warn   { color: var(--yellow); }
  .t-sys    { color: var(--purple); }
  .t-cmd    { color: var(--cyan); }
  .t-html   { color: var(--text); }
  .t-dim    { color: var(--text-dim); }

  /* ASCII art / banner */
  .t-banner {
    font-size: 11px; line-height: 1.3;
    color: var(--red);
    text-shadow: 0 0 10px var(--red-glow);
    margin-bottom: 4px;
  }
  .t-banner span { color: var(--blue); }

  /* Input bar */
  #inputbar {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px;
    background: var(--bg1); border-top: 1px solid var(--border);
    height: 34px;
  }
  #input-prompt {
    color: var(--red); font-size: 13px; user-select: none; flex-shrink: 0;
  }
  #cmd-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--cyan); font-family: var(--font-mono); font-size: 13px;
    caret-color: var(--cyan);
  }
  #cmd-input::placeholder { color: var(--text-dim); }

  /* Editor panel */
  #editor-panel {
    background: var(--bg1);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #editor-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px; height: 28px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .ed-title {
    font-family: var(--font-hud); font-size: 9px;
    color: var(--text-dim); letter-spacing: 3px;
    text-transform: uppercase;
  }
  .ed-file {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--blue);
    margin-left: 8px;
  }
  .ed-btn {
    margin-left: auto; display: flex; gap: 6px;
  }
  .btn {
    font-family: var(--font-hud); font-size: 9px;
    padding: 3px 10px; border-radius: 2px;
    border: 1px solid; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.15s;
    background: transparent;
  }
  .btn-run   { border-color: var(--green); color: var(--green); }
  .btn-run:hover { background: rgba(0,255,136,0.1); box-shadow: 0 0 8px rgba(0,255,136,0.2); }
  .btn-clear { border-color: var(--red); color: var(--red); }
  .btn-clear:hover { background: rgba(255,34,68,0.1); }
  .btn-save  { border-color: var(--blue); color: var(--blue); }
  .btn-save:hover { background: rgba(0,170,255,0.1); }

  #editor-wrap { flex: 1; overflow: hidden; }

  /* CodeMirror overrides — match our theme */
  .CodeMirror {
    height: 100% !important;
    background: #02020a !important;
    color: #c8d0e0 !important;
    font-family: var(--font-mono) !important;
    font-size: 12.5px !important;
    line-height: 1.6 !important;
    border: none !important;
  }
  .CodeMirror-scroll { padding-bottom: 4px !important; }
  .CodeMirror-gutters { background: #06060f !important; border-right: 1px solid #1a1a2e !important; }
  .CodeMirror-linenumber { color: #334466 !important; }
  .CodeMirror-cursor { border-left: 2px solid var(--cyan) !important; }
  .CodeMirror-selected { background: rgba(0,170,255,0.12) !important; }
  .CodeMirror-activeline-background { background: rgba(0,170,255,0.04) !important; }

  /* Syntax token overrides */
  .cm-keyword  { color: #ff2244 !important; font-weight: bold !important; }
  .cm-def      { color: #00aaff !important; }
  .cm-variable { color: #c8d0e0 !important; }
  .cm-variable-2 { color: #00ffee !important; }
  .cm-property { color: #aa44ff !important; }
  .cm-string   { color: #00ff88 !important; }
  .cm-number   { color: #ffcc00 !important; }
  .cm-comment  { color: #445566 !important; font-style: italic !important; }
  .cm-operator { color: #ff8844 !important; }
  .cm-atom     { color: #ff6699 !important; }
  .cm-builtin  { color: #ff2244 !important; }
  .cm-tag      { color: #00aaff !important; }
  .cm-attribute{ color: #ffcc00 !important; }
  .cm-bracket  { color: #aabbcc !important; }
  .CodeMirror-matchingbracket { color: var(--cyan) !important; border-bottom: 1px solid var(--cyan) !important; }
  .CodeMirror-hint { background: var(--bg3) !important; color: var(--text) !important; border: 1px solid var(--border) !important; }
  .CodeMirror-hint-active { background: rgba(0,170,255,0.15) !important; color: var(--blue) !important; }

  /* ─── Right panel ─── */
  #rightpanel {
    background: var(--bg1);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .rp-section {
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rp-title {
    font-family: var(--font-hud); font-size: 9px;
    color: var(--text-dim); letter-spacing: 3px;
    padding: 8px 12px 4px;
    text-transform: uppercase;
  }

  /* Quick stats */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; padding: 6px 12px 10px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 3px; padding: 6px 8px;
  }
  .stat-val {
    font-family: var(--font-hud); font-size: 14px;
    font-weight: 700;
  }
  .stat-lbl { font-size: 9px; color: var(--text-dim); margin-top: 1px; letter-spacing: 1px; }
  .sv-red  { color: var(--red); text-shadow: 0 0 8px var(--red-glow); }
  .sv-blue { color: var(--blue); text-shadow: 0 0 8px var(--blue-glow); }
  .sv-grn  { color: var(--green); }
  .sv-ylw  { color: var(--yellow); }

  /* History */
  #history-list {
    overflow-y: auto; flex: 0 0 140px;
    padding: 4px 0;
  }
  #history-list::-webkit-scrollbar { width: 2px; }
  #history-list::-webkit-scrollbar-thumb { background: var(--border); }
  .hist-item {
    padding: 3px 12px; font-size: 11px;
    color: var(--text-dim); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: all 0.1s;
  }
  .hist-item:hover { color: var(--cyan); background: var(--bg2); }

  /* Vars display */
  #vars-panel {
    flex: 1; overflow-y: auto; padding: 6px 12px;
  }
  #vars-panel::-webkit-scrollbar { width: 2px; }
  #vars-panel::-webkit-scrollbar-thumb { background: var(--border); }
  .var-row {
    display: flex; gap: 6px; align-items: baseline;
    font-size: 11px; margin-bottom: 3px;
  }
  .var-name { color: var(--blue); font-size: 11px; min-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .var-val  { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
  .var-type { color: var(--text-dim); font-size: 9px; margin-left: auto; }

  /* Notifications */
  #notif {
    position: fixed; top: 50px; right: 12px; z-index: 9990;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: none;
  }
  .notif-item {
    background: var(--bg3); border-radius: 4px;
    padding: 8px 14px; font-size: 12px;
    border-left: 3px solid var(--blue);
    animation: notif-in 0.2s ease-out, notif-out 0.3s ease-in 2.7s forwards;
    font-family: var(--font-ui); letter-spacing: 0.5px;
  }
  .notif-item.err { border-color: var(--red); color: var(--red); }
  .notif-item.ok  { border-color: var(--green); color: var(--green); }
  @keyframes notif-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
  @keyframes notif-out { to { opacity: 0; transform: translateX(20px); } }

  /* iframe overlay */
  #iframe-overlay {
    display: none; position: fixed; inset: 44px 0 0 0; z-index: 9000;
    flex-direction: column;
    background: var(--bg0);
  }
  #iframe-overlay.visible { display: flex; }
  #iframe-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 12px; height: 34px; flex-shrink: 0;
  }
  #iframe-title {
    font-family: var(--font-ui); font-size: 13px;
    color: var(--blue); letter-spacing: 1px; flex: 1;
  }
  #iframe-frame { flex: 1; border: none; }
  .iframe-close {
    font-family: var(--font-hud); font-size: 9px; letter-spacing: 2px;
    border: 1px solid var(--red); color: var(--red);
    background: transparent; padding: 3px 10px; cursor: pointer;
    transition: all 0.15s; border-radius: 2px;
  }
  .iframe-close:hover { background: rgba(255,34,68,0.15); }

  /* Autocomplete dropdown */
  #autocomplete {
    display: none; position: fixed;
    background: var(--bg3); border: 1px solid var(--blue-dim);
    border-radius: 3px; z-index: 9500;
    max-height: 160px; overflow-y: auto;
    min-width: 200px;
  }
  #autocomplete::-webkit-scrollbar { width: 2px; }
  .ac-item {
    padding: 5px 12px; font-size: 12px;
    cursor: pointer; font-family: var(--font-mono);
    display: flex; gap: 10px; align-items: center;
  }
  .ac-item:hover, .ac-item.selected { background: rgba(0,170,255,0.12); color: var(--blue); }
  .ac-type { font-size: 9px; color: var(--text-dim); margin-left: auto; font-family: var(--font-hud); letter-spacing: 1px; }
  .ac-type.cmd  { color: var(--red); }
  .ac-type.fn   { color: var(--purple); }
  .ac-type.kw   { color: var(--yellow); }

  /* Custom scrollbar global */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* Glow on input focus */
  #cmd-input:focus { text-shadow: 0 0 8px var(--cyan); }

  /* Progress bar animation */
  .progress-bar {
    height: 3px; background: var(--bg3);
    border-radius: 2px; overflow: hidden; width: 100%; margin: 4px 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--blue));
    border-radius: 2px;
    animation: progress-grow 1.5s ease-out forwards;
  }
  @keyframes progress-grow { from { width: 0; } }

  /* Matrix rain canvas */
  #matrix-canvas {
    display: none;
    position: fixed; inset: 0; z-index: 8000;
    background: black;
    cursor: pointer;
  }

  /* Theme flash */
  @keyframes flash {
    0%   { filter: brightness(2); }
    100% { filter: brightness(1); }
  }
  .flash { animation: flash 0.3s ease-out; }

  /* Mobile adjustments */
  @media (max-width: 900px) {
    #app { grid-template-columns: 0 1fr 0; }
    #sidebar, #rightpanel { display: none; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- Titlebar -->
  <div id="titlebar">
    <div class="tb-logo">HackTerminal</div>
    <div class="tb-sep">|</div>
    <div class="tb-version">HACKSCRIPT v3.0 ENGINE</div>
    <div class="tb-status">
      <div class="status-dot" id="status-dot"></div>
      <div class="tb-clock" id="clock">00:00:00</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Navigator</div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterSidebar('all')">ALL</button>
        <button class="filter-btn" onclick="filterSidebar('proxy')">PROXY</button>
        <button class="filter-btn" onclick="filterSidebar('game')">GAMES</button>
      </div>
    </div>
    <div id="sidebar-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="tabs">
      <div class="tab active" data-tab="terminal">⚡ TERMINAL</div>
      <div class="tab" data-tab="editor" onclick="switchTab('editor')">⌨ EDITOR</div>
      <div class="tab" data-tab="net" onclick="switchTab('net')">🌐 NET</div>
    </div>
    <div id="panels">
      <div id="terminal"></div>
      <div id="inputbar">
        <div id="input-prompt">hackscript&gt;</div>
        <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command or hackscript... (TAB to autocomplete)"/>
      </div>
      <div id="editor-panel">
        <div id="editor-header">
          <div class="ed-title">Editor</div>
          <div class="ed-file" id="editor-filename">scratch.hs</div>
          <div class="ed-btn">

// ─── Terminal output ─────────────────────────────────
function write(text, cls = 't-out', raw = false) {
  const line = document.createElement('div');
  line.className = `t-line`;
  if (raw) {
    line.innerHTML = `<span class="${cls}">${text}</span>`;
  } else {
    line.innerHTML = `<span class="${cls}">${escHtml(String(text))}</span>`;
  }
  $term.appendChild(line);
  $term.scrollTop = $term.scrollHeight;
  ENV.lineCount++;
  document.getElementById('stat-lines').textContent = ENV.lineCount;
}

function writeHtml(html) {
  const line = document.createElement('div');
  line.className = 't-line';
  const span = document.createElement('span');
  span.className = 't-html';
  span.innerHTML = html;
  line.appendChild(span);
  $term.appendChild(line);
  $term.scrollTop = $term.scrollHeight;
}

function writePrompt(text) {
  const line = document.createElement('div');
  line.className = 't-line';

// ─── Editor functions ─────────────────────────────────
function runEditor() {

function clearEditor() { editor?.setValue(''); }
function saveEditor() {
  const code = editor?.getValue() || '';

// Built-in stdlib exposed to scripts
const HS_STDLIB = {

  html: (str) => writeHtml(str),
  css: (str) => {

    document.head.appendChild(tag);
    write('✔ CSS injected.', 't-ok');

    win.document.close();
    write('✔ Rendered in new window.', 't-ok');
  },

  // ── Utilities ───────────────────────────────────────
  clear:   ()         => clearTerm(),
  sleep:   (ms)       => new Promise(r => setTimeout(r, ms)),
  rand:    (a=0,b=1)  => Math.random()*(b-a)+a,
  randInt: (a=0,b=10) => Math.floor(Math.random()*(b-a+1))+a,
  range:   (a,b,s=1)  => { const r=[]; for(let i=a;i<b;i+=s)r.push(i); return r; },
  clamp:   (v,mn,mx)  => Math.min(mx,Math.max(mn,v)),
  lerp:    (a,b,t)    => a+(b-a)*t,
  shuffle: (arr)      => [...arr].sort(()=>Math.random()-0.5),
  unique:  (arr)      => [...new Set(arr)],
  flatten: (arr,d=1)  => arr.flat(d),
  chunk:   (arr,n)    => { const r=[]; for(let i=0;i<arr.length;i+=n)r.push(arr.slice(i,i+n)); return r; },
  zip:     (...arrs)  => arrs[0].map((_,i) => arrs.map(a=>a[i])),

  max:     (arr)      => Math.max(...arr),

  abs:     (n)        => Math.abs(n),
  floor:   (n)        => Math.floor(n),
  ceil:    (n)        => Math.ceil(n),
  round:   (n,d=0)    => Number(n.toFixed(d)),
  sqrt:    (n)        => Math.sqrt(n),
  pow:     (b,e)      => Math.pow(b,e),
  log:     (n,base=Math.E) => Math.log(n)/Math.log(base),
  sin:     (n)        => Math.sin(n),

  tan:     (n)        => Math.tan(n),

  upper:   (s)        => String(s).toUpperCase(),

  trim:    (s)        => String(s).trim(),
  split:   (s,d)      => String(s).split(d),
  join:    (a,d='')   => a.join(d),
  repeat:  (s,n)      => String(s).repeat(n),
  pad:     (s,n,c=' ')=> String(s).padStart(n,c),
  replace: (s,a,b)    => String(s).replace(new RegExp(a,'g'),b),
  includes:(s,q)      => String(s).includes(q),
  startsWith:(s,q)    => String(s).startsWith(q),
  endsWith:(s,q)      => String(s).endsWith(q),
  encode:  (s)        => btoa(s),
  decode:  (s)        => atob(s),
  hash:    async (s)  => {

  now:     ()         => new Date().toLocaleString(),
  timestamp: ()       => Date.now(),

  json:    (v)        => JSON.stringify(v, null, 2),
  parse:   (s)        => JSON.parse(s),
  keys:    (o)        => Object.keys(o),
  values:  (o)        => Object.values(o),
  entries: (o)        => Object.entries(o),
  merge:   (...objs)  => Object.assign({}, ...objs),
  pick:    (o,...ks)  => Object.fromEntries(ks.map(k=>[k,o[k]])),

  vars:    ()         => { write(JSON.stringify(ENV.vars,null,2), 't-info'); },
  fns:     ()         => { write(JSON.stringify(Object.keys(ENV.fns)), 't-info'); },
  history: ()         => { ENV.history.forEach((h,i) => write(`${i}: ${h}`, 't-dim')); },
  help:    (topic)    => showHelp(topic),
  version: ()         => write('HackScript v3.0 — HackTerminal Engine', 't-sys'),
  clear:   ()         => clearTerm(),
  links:   ()         => {

  proxies: ()         => { LINKS.filter(l=>l.cat==='proxy').forEach(l=>write(`${l.n} → ${l._}`, 't-info')); },
  games:   ()         => { LINKS.filter(l=>l.cat==='game').forEach(l=>write(`${l.n} → ${l._}`, 't-info')); },
  notify:  (msg,t)    => notify(msg, t),
  matrix:  ()         => startMatrix(),
  stopMatrix: ()      => stopMatrix(),
  theme:   (name)     => applyTheme(name),
  fetch:   async (url, opts) => {
    try {
      const r = await fetch(url, opts);
      const txt = await r.text();
      return txt;
    } catch(e) { write('✖ Fetch failed: ' + e.message, 't-err'); return null; }
  },
  assert:  (cond,msg='Assertion failed') => { if(!cond) throw new Error(msg); write(`✔ Assert passed`, 't-ok'); },
  type:    (v)        => { write(Array.isArray(v)?'array':typeof v, 't-info'); },
  inspect: (v)        => { write(JSON.stringify(v,null,2), 't-info'); },
  sizeof:  (v)        => {
    const s = JSON.stringify(v);
    const b = new Blob([s]).size;
    write(`${b} bytes`, 't-info');
  },
  demo:    ()         => runDemo(),
  about:   ()         => showAbout(),
  count:   (arr,pred) => pred ? arr.filter(pred).length : arr.length,
  filter:  (arr,fn)   => arr.filter(fn),
  map:     (arr,fn)   => arr.map(fn),
  reduce:  (arr,fn,i) => arr.reduce(fn,i),
  sort:    (arr,fn)   => [...arr].sort(fn),
  reverse: (arr)      => [...arr].reverse(),
  first:   (arr,n=1)  => n===1?arr[0]:arr.slice(0,n),
  last:    (arr,n=1)  => n===1?arr[arr.length-1]:arr.slice(-n),
  sample:  (arr,n=1)  => HS_STDLIB.shuffle(arr).slice(0,n),
  pipe:    (...fns)   => (v) => fns.reduce((a,f)=>f(a),v),
  compose: (...fns)   => (v) => fns.reduceRight((a,f)=>f(a),v),
  memoize: (fn)       => { const c={}; return (...a)=>{ const k=JSON.stringify(a); return k in c?c[k]:c[k]=fn(...a); }; },
  curry:   (fn)       => function cur(...a){ return a.length>=fn.length?fn(...a):(...b)=>cur(...a,...b); },
  debounce:(fn,ms)    => { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; },
  once:    (fn)       => { let r,c=false; return (...a)=>{ if(!c){c=true;r=fn(...a);} return r; }; },
};

// ─── Preprocess HackScript → JS ──────────────────────
function preprocessHackScript(code) {
  // Tagged template literal: html`...` becomes HS_STDLIB.html(`...`)
  code = code.replace(/\bhtml\s*`/g, 'HS_STDLIB.html(`');
  // css`...`
  code = code.replace(/\bcss\s*`/g, 'HS_STDLIB.css(`');
  // log shorthand
  code = code.replace(/\blog\b(?=\s*\()/g, 'HS_STDLIB.print');
  // $ shorthand for print
  code = code.replace(/^\$\s+/gm, 'HS_STDLIB.print(') ;
  return code;
}

// ─── Execute HackScript ──────────────────────────────
async function executeHackScript(code) {
  ENV.cmdCount++;
  updateStats();
  try {
    code = preprocessHackScript(code);
    // Build function with full stdlib + ENV vars in scope
    const varDecls = Object.entries(ENV.vars)
      .map(([k,v]) => `let ${k} = __env__.vars['${k}'];`)
      .join('\n');

    const fnDecls = Object.entries(ENV.fns)
      .map(([k,v]) => `const ${k} = __env__.fns['${k}'];`)
      .join('\n');

    const wrapped = `(async function(__env__, HS_STDLIB) {
      // Destructure stdlib
      const {${Object.keys(HS_STDLIB).join(',')}} = HS_STDLIB;
      // Inject user vars
      ${varDecls}
      ${fnDecls}
      // User code
      ${code}
      // Capture new/updated vars (best-effort via with trick isn't reliable — use ENV directly)
    })(__ENV__, HS_STDLIB)`;

    const result = await eval(wrapped);
    if (result !== undefined) {
      write(typeof result === 'object' ? JSON.stringify(result, null, 2) : String(result), 't-ok');
    }
  } catch(e) {
    write(`✖ ${e.name}: ${e.message}`, 't-err');
  }
  updateStats();
}

// ─── Help system ─────────────────────────────────────
function showHelp(topic) {
  const categories = {
    output:  ['print','println','info','warn','error','success','sys','dim','banner','table','chart','progress','html','css','render'],
    math:    ['rand','randInt','range','clamp','lerp','sum','mean','median','max','min','std','abs','floor','ceil','round','sqrt','pow','log','sin','cos','tan','PI','E'],
    string:  ['upper','lower','trim','split','join','repeat','pad','replace','includes','startsWith','endsWith','encode','decode','hash','uuid'],
    array:   ['shuffle','unique','flatten','chunk','zip','count','filter','map','reduce','sort','reverse','first','last','sample'],
    functional: ['pipe','compose','memoize','curry','debounce','once'],
    data:    ['json','parse','keys','values','entries','merge','pick','omit','deepClone','type','inspect','sizeof'],
    system:  ['clear','sleep','now','timestamp','date','time','timer','vars','fns','history','help','version'],
    net:     ['fetch','open','openUrl','proxies','games','links'],
    fx:      ['matrix','stopMatrix','theme','notify','demo','about'],
  };
  if (!topic) {
    write('─── HackScript v3.0 Help ───────────────────', 't-sys');
    write('Categories: ' + Object.keys(categories).join(', '), 't-info');
    write('Usage: help("category")  or  help("command")', 't-dim');
    write('', 't-dim');
    write('Type any JS or HackScript — it runs directly.', 't-dim');
    write('Multiline: use the editor panel below.', 't-dim');
    return;
  }
  if (categories[topic]) {
    write(`─── ${topic.toUpperCase()} ─────────────────────────`, 't-sys');
    categories[topic].forEach(cmd => write(`  ${cmd}()`, 't-info'));
  } else {
    // Search for specific command
    write(`Searching for "${topic}"...`, 't-dim');
    const all = Object.values(categories).flat();
    const found = all.filter(c => c.toLowerCase().includes(topic.toLowerCase()));
    if (found.length) found.forEach(c => write(`  ${c}()`, 't-info'));
    else write('Not found. Try help() for categories.', 't-warn');
  }
}

// ─── Matrix effect ───────────────────────────────────
function startMatrix() {
  $matrix.style.display = 'block';
  $matrix.width  = window.innerWidth;
  $matrix.height = window.innerHeight;
  const ctx = $matrix.getContext('2d');
  const cols = Math.floor($matrix.width / 14);
  const drops = Array(cols).fill(0);
  ENV.matrixRunning = true;

  function frame() {
    if (!ENV.matrixRunning) return;
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, $matrix.width, $matrix.height);
    ctx.font = '13px Share Tech Mono';
    drops.forEach((y, i) => {
      const ch = String.fromCharCode(0x30A0 + Math.random() * 96);
      const r = Math.random();
      ctx.fillStyle = r > 0.98 ? '#ffffff' : r > 0.8 ? '#00aaff' : '#ff2244';
      ctx.fillText(ch, i * 14, y * 14);
      if (y * 14 > $matrix.height && Math.random() > 0.975) drops[i] = 0;
      else drops[i]++;
    });
    ENV.matrixRaf = requestAnimationFrame(frame);
  }
  frame();
  write('Matrix started — click canvas to stop.', 't-info');
}

function stopMatrix() {
  ENV.matrixRunning = false;
  cancelAnimationFrame(ENV.matrixRaf);
  $matrix.style.display = 'none';
  write('Matrix stopped.', 't-dim');
}

// ─── Themes ──────────────────────────────────────────
function applyTheme(name) {
  const themes = {
    red:    { '--red':'#ff2244', '--blue':'#cc1133', '--cyan':'#ff6688' },
    blue:   { '--red':'#0088ff', '--blue':'#00aaff', '--cyan':'#00ccff' },
    green:  { '--red':'#00ff88', '--blue':'#00cc66', '--cyan':'#00ffaa' },
    purple: { '--red':'#cc44ff', '--blue':'#8800ff', '--cyan':'#dd88ff' },
    hacker: { '--red':'#00ff00', '--blue':'#00cc00', '--cyan':'#88ff00' },
    cyber:  { '--red':'#ff2244', '--blue':'#00aaff', '--cyan':'#00ffee' },
  };
  if (!themes[name]) { write(`Themes: ${Object.keys(themes).join(', ')}`, 't-info'); return; }
  const root = document.documentElement;
  Object.entries(themes[name]).forEach(([k,v]) => root.style.setProperty(k,v));
  write(`✔ Theme "${name}" applied.`, 't-ok');
  notify(`Theme: ${name}`, 'ok');
}

// ─── Autocomplete ────────────────────────────────────
const ALL_COMPLETIONS = [
  ...Object.keys(HS_STDLIB).map(k => ({label:k, type: typeof HS_STDLIB[k] === 'function' ? 'fn' : 'kw'})),
  ...['let','const','var','async','await','for','while','if','else','return','function','class','import','export','try','catch','throw','new','typeof','instanceof','in','of'].map(k => ({label:k, type:'kw'})),
  ...LINKS.map(l => ({label:`open("${l.n}")`, type:'cmd'})),
];

function updateAutocomplete(val) {
  const word = val.split(/\s+/).pop().replace(/[^a-zA-Z0-9_"]/g,'');
  if (!word || word.length < 2) { $ac.style.display='none'; return; }
  const matches = ALL_COMPLETIONS.filter(c => c.label.startsWith(word)).slice(0, 12);
  if (!matches.length) { $ac.style.display='none'; return; }

  $ac.innerHTML = '';
  matches.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'ac-item' + (i===0?' selected':'');
    el.innerHTML = `<span>${escHtml(m.label)}</span><span class="ac-type ${m.type}">${m.type}</span>`;
    el.onmousedown = (e) => { e.preventDefault(); applyCompletion(m.label, word); };
    $ac.appendChild(el);
  });

  const rect = $input.getBoundingClientRect();
  $ac.style.left  = rect.left + 'px';
  $ac.style.bottom = (window.innerHeight - rect.top + 2) + 'px';
  $ac.style.display = 'block';
}

function applyCompletion(label, word) {
  const cur = $input.value;
  const lastIdx = cur.lastIndexOf(word);
  $input.value = cur.slice(0, lastIdx) + label;
  $ac.style.display = 'none';
  $input.focus();
}

// ─── Input handling ──────────────────────────────────
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = $input.value.trim();
    if (!val) return;
    $ac.style.display = 'none';
    writePrompt(val);
    addHistory(val);
    $input.value = '';
    executeHackScript(val);

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (ENV.histIdx < ENV.history.length - 1) {
      ENV.histIdx++;
      $input.value = ENV.history[ENV.histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (ENV.histIdx > 0) { ENV.histIdx--; $input.value = ENV.history[ENV.histIdx]; }
    else { ENV.histIdx = -1; $input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const items = $ac.querySelectorAll('.ac-item');
    if (items.length) {
      const sel = $ac.querySelector('.ac-item.selected');
      const label = sel ? sel.querySelector('span').textContent : items[0].querySelector('span').textContent;
      const word = $input.value.split(/\s+/).pop().replace(/[^a-zA-Z0-9_"]/g,'');
      applyCompletion(label, word);
    }
  } else if (e.key === 'Escape') {
    $ac.style.display = 'none';
  }
});

$input.addEventListener('input', () => updateAutocomplete($input.value));
document.addEventListener('click', (e) => { if (!$ac.contains(e.target)) $ac.style.display='none'; });
$input.focus();

// Auto-focus on keypress anywhere
document.addEventListener('keydown', (e) => {
  if (e.target !== $input && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
    $input.focus();
  }
});
